<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AtomQuest Goal Portal</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AQ</div>
          <div>
            <h1>AtomQuest</h1>
            <p>Goal Portal</p>
          </div>
        </div>

        <label class="field compact">
          <span>Current user</span>
          <select id="userSelect"></select>
        </label>

        <nav class="nav" id="nav"></nav>

        <div class="cycle-box">
          <span class="eyebrow">Active cycle</span>
          <strong id="activeCycleLabel"></strong>
          <small id="activeCycleHint"></small>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <span class="eyebrow" id="roleLabel"></span>
            <h2 id="pageTitle"></h2>
          </div>
          <div class="top-actions">
            <button class="ghost" id="themeButton" type="button" aria-pressed="false">Dark mode</button>
            <button class="ghost" id="seedButton" type="button">Reset demo data</button>
            <button id="exportButton" type="button">Export CSV</button>
          </div>
        </header>

        <section id="alerts" class="alerts" aria-live="polite"></section>
        <section id="view" class="view"></section>
      </main>
    </div>

    <template id="modalTemplate">
      <div class="modal-backdrop">
        <div class="modal">
          <div class="modal-head">
            <h3></h3>
            <button class="icon-button" type="button" aria-label="Close">×</button>
          </div>
          <div class="modal-body"></div>
        </div>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
